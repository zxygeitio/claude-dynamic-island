name: Windows CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: TypeScript and frontend build
        run: npm run build

      - name: Rust check
        run: cargo check
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Dynamic Island</title>
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <div id="island" class="island" style="background: transparent;">
      <div class="island-pill">
        <div class="island-character">
          <canvas id="character-canvas" width="32" height="32"></canvas>
        </div>
        <div class="island-status">
          <div class="status-collapsed">
            <span class="status-indicator" id="status-indicator"></span>
            <span class="status-text" id="status-text">Idle</span>
            <span class="tool-icon" id="tool-icon"></span>
          </div>
          <div class="status-expanded" id="status-expanded">
            <div class="status-header">
              <span class="session-id" id="session-id"></span>
              <div class="status-header-actions">
                <span class="status-badge" id="status-badge">Idle</span>
                <button class="quit-button" id="quit-button" type="button" aria-label="Close Claude Dynamic Island">
                  <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M4 4L12 12M12 4L4 12" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="status-details">
              <div class="detail-row">
                <span class="detail-label">Tool:</span>
                <span class="detail-value" id="current-tool">-</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">File:</span>
                <span class="detail-value file-path" id="current-file">-</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Note:</span>
                <span class="detail-value" id="current-note">-</span>
              </div>
            </div>
            <div class="status-overview">
              <div class="overview-chip">
                <span class="overview-chip-label">Link</span>
                <span class="overview-chip-value" id="connection-state">Waiting</span>
              </div>
              <div class="overview-chip">
                <span class="overview-chip-label">Events</span>
                <span class="overview-chip-value" id="event-count">0</span>
              </div>
              <div class="overview-chip">
                <span class="overview-chip-label">Errors</span>
                <span class="overview-chip-value" id="error-count">0</span>
              </div>
            </div>
            <div class="status-signal-card">
              <div class="signal-card-label">Last hook</div>
              <div class="signal-card-value" id="last-hook-event">No hook yet</div>
            </div>
            <div class="action-history" id="action-history">
              <div class="history-label">Recent:</div>
              <div class="history-list" id="history-list"></div>
            </div>
            <div class="selection-panel" id="selection-panel">
              <div class="selection-label">Question</div>
              <div class="selection-prompt" id="selection-prompt">Waiting for Claude prompt...</div>
              <div class="selection-options" id="selection-options"></div>
              <div class="selection-actions" id="selection-actions">
                <button class="selection-submit" id="selection-submit">Send Answer</button>
              </div>
            </div>
            <div class="approval-buttons" id="approval-buttons">
              <button class="btn-approve" id="btn-approve">Approve</button>
              <button class="btn-deny" id="btn-deny">Deny</button>
              <span class="approval-timer" id="approval-timer">30s</span>
            </div>
          </div>
        </div>
        <div class="island-expand-hint" id="expand-hint">
          <svg width="12" height="12" viewBox="0 0 12 12">
            <path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
